            { n:6,  short: "Delete large message attachments",                   detail: "Settings > General > iPhone Storage > Messages > Review Large Attachments. Sort by size and delete old photos/videos sent in texts." },
            { n:7,  short: "Clear browser cache",                                detail: "Safari: Settings > Safari > Clear History and Website Data. Chrome: Settings > Privacy > Clear Browsing Data." },
            { n:8,  short: "Review and delete old voicemails",                   detail: "Phone > Voicemail > scroll to bottom > Deleted Messages > Clear All. Also manually delete any saved voicemails no longer needed." },
            { n:9,  short: "Back up to iCloud before any major deletions",       detail: "Settings > [Name] > iCloud > iCloud Backup > Back Up Now. Always confirm backup completes before deleting large batches." },
            { n:10, short: "Set up iCloud auto-backup for ongoing maintenance",  detail: "Settings > [Name] > iCloud > iCloud Backup > toggle ON. Backup occurs automatically when plugged in, locked, and on Wi-Fi." },
          ],
        },
        android: {
          title: "Consolidation & Deduplication — Android",
          items: [
            { n:1,  short: "Audit storage in Settings",                          detail: "Settings > Storage. Note total used, available, and breakdown by category. Screenshot for the client's records." },
            { n:2,  short: "Uninstall unused apps",                              detail: "Settings > Apps. Sort by Last Used or Size. Uninstall apps unused in the last 90 days. Confirm with client for apps with data." },
            { n:3,  short: "Run Google Photos duplicate detection",              detail: "Google Photos > Library > Utilities > Free Up Space. Shows duplicates, blurry shots, and screenshots. Review before deleting." },
            { n:4,  short: "Delete duplicate and junk photos",                   detail: "Work through Free Up Space suggestions. Also manually review Albums > Screenshots and Albums > Videos for bulk-delete candidates." },
            { n:5,  short: "Clear app caches",                                   detail: "Settings > Apps > [App Name] > Storage > Clear Cache. Do this for the top 5 largest apps. Cache is temporary — always safe to delete." },
            { n:6,  short: "Review and delete large files in Downloads",         detail: "Files app > Downloads. Sort by size. Delete old APKs, large PDFs, and media files already saved elsewhere." },
            { n:7,  short: "Move large media to SD card or cloud (if applicable)", detail: "If device has an SD card: Files app > move Videos/Music to SD card. If no SD card, move to Google Drive or back up and delete locally." },
            { n:8,  short: "Back up to Google Drive before major deletions",     detail: "Settings > Google > Backup > Back up now. Confirm backup completes before deleting any large media batches." },
            { n:9,  short: "Set up Google One Backup",                           detail: "Google One app > Settings > Manage backup. Enable contacts, SMS, photos, and app data backup. Set to auto-backup on Wi-Fi." },
            { n:10, short: "Establish a monthly cleanup routine",                detail: "Monthly: run Free Up Space, clear caches, review Downloads. Set a recurring phone reminder for the client." },
          ],
        },
      },
    };

    function App() {
      const [activeService, setActiveService] = useState("drive");
      const [activePlatform, setActivePlatform] = useState("universal");
      const [tier, setTier] = useState("new");
      const [checked, setChecked] = useState({});

      const service = SERVICES.find(s => s.id === activeService);
      const platforms = service?.platforms || ["universal"];

      const handleServiceChange = (id) => {
        const svc = SERVICES.find(s => s.id === id);
        setActiveService(id);
        setActivePlatform(svc?.platforms[0] || "universal");
      };

      const currentData = DATA[activeService]?.[activePlatform];
      const items = currentData?.items || [];
      const title = currentData?.title || "";

      const toggleCheck = (key) => setChecked(prev => ({ ...prev, [key]: !prev[key] }));

      const checkedCount = items.filter(item => checked[`${activeService}-${activePlatform}-${item.n}`]).length;

      return (
        <div style={{ fontFamily: "Calibri, Arial, sans-serif", minHeight: "100vh", backgroundColor: "#f5f7fa" }}>
          {/* Header */}
          <div style={{ backgroundColor: DARK_BLUE, color: "white", padding: "20px 28px 16px" }}>
            <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", opacity: 0.7, marginBottom: 4 }}>Tidy Haus</div>
            <div style={{ fontSize: 22, fontWeight: "bold" }}>Consultant Priority Lists</div>
            <div style={{ fontSize: 13, opacity: 0.8, marginTop: 4 }}>Top 10 priorities by service — in order</div>
          </div>

          {/* Tier Toggle */}
          <div style={{ backgroundColor: "#e8edf5", borderBottom: "1px solid #d0daea", padding: "10px 28px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 12, color: "#555", fontWeight: "bold", marginRight: 4 }}>VIEW:</span>
            {[{ id: "new", label: "🎓 New Consultant" }, { id: "experienced", label: "⚡ Experienced" }].map(t => (
              <button key={t.id} onClick={() => setTier(t.id)} style={{
                padding: "5px 14px", borderRadius: 20,
                border: tier === t.id ? `2px solid ${DARK_BLUE}` : "2px solid #c0c8d8",
                backgroundColor: tier === t.id ? DARK_BLUE : "white",
                color: tier === t.id ? "white" : "#333",
                fontWeight: tier === t.id ? "bold" : "normal", fontSize: 12
              }}>{t.label}</button>
            ))}
            <span style={{ marginLeft: "auto", fontSize: 12, color: "#888" }}>{checkedCount}/{items.length} completed</span>
          </div>

          {/* Service Tabs */}
          <div style={{ backgroundColor: "white", borderBottom: "2px solid #d0daea", padding: "0 20px", display: "flex", overflowX: "auto", gap: 2 }}>
            {SERVICES.map(svc => (
              <button key={svc.id} onClick={() => handleServiceChange(svc.id)} style={{
                padding: "12px 14px", border: "none",
                borderBottom: activeService === svc.id ? `3px solid ${DARK_BLUE}` : "3px solid transparent",
                backgroundColor: "transparent",
                color: activeService === svc.id ? DARK_BLUE : "#666",
                fontWeight: activeService === svc.id ? "bold" : "normal",
                fontSize: 13, whiteSpace: "nowrap"
              }}>{svc.icon} {svc.label}</button>
            ))}
          </div>

          {/* Platform Selector */}
          {platforms.length > 1 && (
            <div style={{ backgroundColor: "#f0f4fa", borderBottom: "1px solid #d8e2f0", padding: "10px 28px", display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: "#555", fontWeight: "bold", marginRight: 4 }}>PLATFORM:</span>
              {platforms.map(p => (
                <button key={p} onClick={() => setActivePlatform(p)} style={{
                  padding: "5px 14px", borderRadius: 20,
                  border: activePlatform === p ? `2px solid ${MED_BLUE}` : "2px solid #c0c8d8",
                  backgroundColor: activePlatform === p ? MED_BLUE : "white",
                  color: activePlatform === p ? "white" : "#333",
                  fontWeight: activePlatform === p ? "bold" : "normal", fontSize: 12
                }}>{PLATFORM_LABELS[p]}</button>
              ))}
            </div>
          )}

          {/* Content */}
          <div style={{ maxWidth: 820, margin: "24px auto", padding: "0 20px 40px" }}>
            <div style={{ marginBottom: 20 }}>
              <h2 style={{ color: DARK_BLUE, fontSize: 18, fontWeight: "bold", margin: 0 }}>{title}</h2>
              {tier === "new" && <p style={{ color: "#666", fontSize: 13, margin: "6px 0 0" }}>Full guidance mode — each step includes explanation and context.</p>}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {items.map(item => {
                const key = `${activeService}-${activePlatform}-${item.n}`;
                const done = !!checked[key];
                return (
                  <div key={key} onClick={() => toggleCheck(key)} style={{
                    backgroundColor: done ? "#f0f7f0" : "white",
                    border: `1px solid ${done ? "#b5d6b5" : "#d8e2f0"}`,
                    borderRadius: 8, padding: "14px 16px", cursor: "pointer",
                    display: "flex", gap: 14, alignItems: "flex-start"
                  }}>
                    <div style={{
                      width: 28, height: 28, borderRadius: "50%",
                      border: `2px solid ${done ? "#4a9e4a" : DARK_BLUE}`,
                      backgroundColor: done ? "#4a9e4a" : "transparent",
                      display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
                    }}>
                      {done
                        ? <span style={{ color: "white", fontSize: 14, fontWeight: "bold" }}>✓</span>
                        : <span style={{ color: DARK_BLUE, fontSize: 13, fontWeight: "bold" }}>{item.n}</span>
                      }
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontWeight: "bold", color: done ? "#3a7a3a" : DARK_BLUE,
                        fontSize: 14, marginBottom: tier === "new" ? 5 : 0,
                        textDecoration: done ? "line-through" : "none", opacity: done ? 0.7 : 1
                      }}>{item.short}</div>
                      {tier === "new" && (
                        <div style={{ color: done ? "#666" : "#444", fontSize: 13, lineHeight: 1.5, opacity: done ? 0.6 : 1 }}>
                          {item.detail}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Progress bar */}
            <div style={{ marginTop: 24, backgroundColor: "#e0e8f0", borderRadius: 8, height: 8, overflow: "hidden" }}>
              <div style={{
                height: "100%",
                width: `${items.length > 0 ? (checkedCount / items.length) * 100 : 0}%`,
                backgroundColor: checkedCount === items.length ? "#4a9e4a" : MED_BLUE,
                transition: "width 0.3s", borderRadius: 8
              }} />
            </div>
            {checkedCount === items.length && items.length > 0 && (
              <div style={{ textAlign: "center", marginTop: 12, color: "#4a9e4a", fontWeight: "bold", fontSize: 14 }}>
                ✅ All {items.length} steps complete!
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
